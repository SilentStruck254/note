<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>Honey's journal ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;900&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FFF0F3;
            --surface: #FFFFFF;
            --surface2: #FFF5F7;
            --border: #FFB3C1;
            --border2: #FF85A1;
            --shadow: #C94F72;
            --text: #1E0610;
            --text2: #7D2040;
            --text3: #C94F72;
            --accent: #FF3366;
            --accent2: #FF6B9D;
            --strip-bg: #FFFFFF;
            --panel-bg: #FFFFFF;
            --panel-border: #FF3366;
            --panel-inner: #FFF5F7;
            --grid-header: #FF3366;
            --grid-header-text: #FFFFFF;
            --grid-row-bg: #FF6B9D;
            --grid-row-text: #FFFFFF;
            --grid-cell: #FFF0F3;
            --grid-cell-border: #FFD0DC;
            --swatch-bg: #FFF5F7;
            --swatch-border: #FFB3C1;
            --swatch-text: #1E0610;
            --clock-bg: #FF3366;
            --clock-text: #FFFFFF;
            --toggle-bg: #FF3366;
            --toggle-text: #FFFFFF;
            --menu-bg: #FFFFFF;
            --menu-border: #FF3366;
            --menu-shadow: rgba(200,40,80,0.25);
        }
        [data-theme="dark"] {
            --bg: #140208;
            --surface: #220810;
            --surface2: #2E101A;
            --border: #5C1A30;
            --border2: #8C2848;
            --shadow: #080004;
            --text: #FFE5EA;
            --text2: #FFB3C1;
            --text3: #FF85A1;
            --accent: #FF3366;
            --accent2: #FF6B9D;
            --strip-bg: #220810;
            --panel-bg: #220810;
            --panel-border: #FF3366;
            --panel-inner: #2E101A;
            --grid-header: #FF3366;
            --grid-header-text: #FFFFFF;
            --grid-row-bg: #5C1A30;
            --grid-row-text: #FFE0E8;
            --grid-cell: #2E101A;
            --grid-cell-border: #5C1A30;
            --swatch-bg: #2E101A;
            --swatch-border: #5C1A30;
            --swatch-text: #FFE5EA;
            --clock-bg: #FF3366;
            --clock-text: #FFFFFF;
            --toggle-bg: #FFB3C1;
            --toggle-text: #1E0610;
            --menu-bg: #2E101A;
            --menu-border: #FF3366;
            --menu-shadow: rgba(0,0,0,0.55);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: var(--bg);
            font-family: 'Nunito', sans-serif;
            color: var(--text);
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.35s ease, color 0.35s ease;
            scroll-behavior: smooth;
        }

        /* ─── LOADING ─── */
        .loading-overlay {
            position: fixed; inset: 0;
            background: var(--accent);
            z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.45s ease, visibility 0.45s;
            overflow: hidden;
        }
        .loading-overlay::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at 15% 25%, rgba(255,255,255,0.18) 0%, transparent 45%),
                        radial-gradient(circle at 85% 75%, rgba(0,0,0,0.12) 0%, transparent 40%);
        }
        .loading-hidden { opacity: 0 !important; visibility: hidden !important; pointer-events: none !important; }
        .ls { position: absolute; pointer-events: none;
              font-size: clamp(1.5rem,5vw,2.8rem);
              animation: lsFloat 3.5s ease-in-out infinite; }
        @keyframes lsFloat {
            0%,100% { transform: translateY(0) rotate(-5deg); }
            50%      { transform: translateY(-18px) rotate(5deg) scale(1.05); }
        }
        .cursive-kelly {
            font-family: 'Pacifico', cursive;
            font-size: clamp(4.5rem, 20vw, 9rem);
            color: #fff;
            text-shadow: 4px 4px 0 rgba(0,0,0,0.18), 0 0 80px rgba(255,255,255,0.35);
            z-index: 1; position: relative;
            animation: kellyPulse 2s ease-in-out infinite alternate;
            letter-spacing: 2px;
        }
        @keyframes kellyPulse {
            from { transform: scale(1) rotate(-1.5deg); }
            to   { transform: scale(1.05) rotate(1deg); }
        }
        .loading-sub {
            font-size: clamp(1rem,4vw,1.5rem);
            color: rgba(255,255,255,0.95);
            background: rgba(255,255,255,0.22);
            padding: 0.65rem 2rem; border-radius: 100px;
            border: 2px solid rgba(255,255,255,0.45);
            font-weight: 800; letter-spacing: 1px;
            z-index: 1; position: relative; margin-top: 1.4rem;
        }

        /* ─── DARK TOGGLE ─── */
        .dark-toggle {
            position: fixed; top: 1rem; right: 1rem; z-index: 800;
            background: var(--toggle-bg); color: var(--toggle-text);
            border: 3px solid rgba(255,255,255,0.25); border-radius: 100px;
            padding: 0.5rem 1.2rem; font-size: 1.1rem; font-weight: 900;
            cursor: pointer; font-family: 'Nunito', sans-serif;
            box-shadow: 0 4px 0 var(--shadow);
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .dark-toggle:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--shadow); }

        /* ─── WRAPPER ─── */
        .site-wrapper { width: 100%; max-width: 1400px; padding: 0.5rem 1.5rem 5rem; opacity: 0; transition: opacity 0.5s ease; }
        .site-wrapper.visible { opacity: 1; }

        /* ─── HEADER ─── */
        .journal-header { text-align: center; margin: 2rem 0 2.5rem; }
        .journal-title {
            font-family: 'Pacifico', cursive;
            font-size: clamp(2.8rem, 9vw, 5.5rem);
            color: #fff; background: var(--accent);
            display: inline-block; padding: 0.45rem 3rem 0.65rem;
            border-radius: 120px; border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 8px 0 var(--shadow), 0 18px 50px rgba(255,51,102,0.28);
            letter-spacing: 2px; position: relative;
        }
        .journal-title::after {
            content: ''; position: absolute; inset: 5px; border-radius: 112px;
            border: 2px solid rgba(255,255,255,0.18); pointer-events: none;
        }

        /* ─── CALENDAR ─── */
        .calendar-section { display: flex; justify-content: center; margin: 0 0 2.5rem; }
        .kawaii-calendar {
            background: var(--surface); border-radius: 32px;
            padding: 0 2rem 2.5rem;
            box-shadow: 0 10px 0 var(--shadow), 0 24px 60px rgba(255,51,102,0.18);
            border: 3px solid var(--border2);
            width: 100%; max-width: 820px;
            position: relative; overflow: hidden;
        }
        .rainbow-stripe {
            height: 9px;
            background: repeating-linear-gradient(90deg,
                #FF3366 0,#FF3366 14.28%,#FF8C00 14.28%,#FF8C00 28.57%,
                #FFD600 28.57%,#FFD600 42.86%,#00C853 42.86%,#00C853 57.14%,
                #00B0FF 57.14%,#00B0FF 71.43%,#AA00FF 71.43%,#AA00FF 85.71%,
                #FF3366 85.71%,#FF3366 100%);
            margin-bottom: 1.8rem;
        }
        .calendar-header { display: flex; justify-content: space-between; align-items: center; padding: 0 0 1.5rem; }
        .month-year {
            background: var(--accent); color: #fff;
            padding: 0.65rem 2rem; border-radius: 100px;
            font-size: clamp(1.1rem,3.5vw,1.8rem); font-weight: 900;
            box-shadow: 0 4px 0 var(--shadow); cursor: pointer;
            border: 3px solid rgba(255,255,255,0.28);
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .month-year:active { transform: translateY(4px); box-shadow: 0 1px 0 var(--shadow); }
        .arrow {
            width: 58px; height: 58px; background: var(--accent); color: #fff;
            display: flex; align-items: center; justify-content: center;
            border-radius: 50%; font-size: 1.4rem; font-weight: 900; cursor: pointer;
            box-shadow: 0 5px 0 var(--shadow); border: 3px solid rgba(255,255,255,0.25);
            transition: transform 0.1s, box-shadow 0.1s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent; user-select: none;
        }
        .arrow:active { transform: translateY(5px); box-shadow: none; }
        .clock-wrap { text-align: center; margin-bottom: 1.6rem; }
        .live-time {
            display: inline-flex; align-items: center; gap: 0.5rem;
            background: var(--clock-bg); color: var(--clock-text);
            padding: 0.5rem 1.8rem; border-radius: 100px;
            font-size: clamp(1rem,3vw,1.4rem); font-weight: 900;
            box-shadow: 0 4px 0 var(--shadow); border: 3px solid rgba(255,255,255,0.22);
        }
        .weekdays {
            display: grid; grid-template-columns: repeat(7,1fr); text-align: center;
            font-size: clamp(1.1rem,3.2vw,1.5rem); color: var(--text3); font-weight: 900;
            margin-bottom: 0.8rem;
        }
        .days-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 6px; }
        .day-cell {
            background: var(--surface2); border-radius: 14px;
            font-size: clamp(0.85rem,2.3vw,1.25rem); font-weight: 800; color: var(--text);
            box-shadow: 0 3px 0 var(--border); border: 2px solid var(--border);
            aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center;
        }
        .day-cell.today { background: var(--accent); color: #fff; box-shadow: 0 3px 0 var(--shadow); border-color: rgba(255,255,255,0.3); }
        .day-cell.other-month { opacity: 0.28; }
        .cal-note { text-align: center; margin-top: 1.6rem; font-size: 1.05rem; color: var(--text3); font-weight: 700; }

        /* ─── OCTAGON STRIP ─── */
        .octagon-strip {
            display: flex; flex-wrap: wrap; justify-content: center; align-items: center;
            gap: 0.75rem 1rem; margin: 0 0 2.5rem;
            padding: 1.5rem 2rem 1.8rem;
            background: var(--strip-bg); border-radius: 30px;
            border: 3px solid var(--border2);
            box-shadow: 0 8px 0 var(--shadow), 0 18px 40px rgba(0,0,0,0.09);
        }
        .strip-label { width: 100%; text-align: center; font-size: 0.9rem; font-weight: 900; color: var(--text3); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 0.2rem; }
        .octa-btn {
            width: 66px; height: 66px;
            clip-path: polygon(30% 0%,70% 0%,100% 30%,100% 70%,70% 100%,30% 100%,0% 70%,0% 30%);
            border: none; font-size: 1.75rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            filter: drop-shadow(0 5px 0 rgba(0,0,0,0.22));
            transition: transform 0.1s, filter 0.1s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .octa-btn:hover  { transform: scale(1.1); filter: drop-shadow(0 6px 0 rgba(0,0,0,0.28)) brightness(1.06); }
        .octa-btn:active { transform: translateY(4px) scale(0.97); filter: drop-shadow(0 1px 0 rgba(0,0,0,0.2)); }
        .octa-btn[data-color="0"]  { background: #FF3366; }
        .octa-btn[data-color="1"]  { background: #FF8C00; }
        .octa-btn[data-color="2"]  { background: #FF1744; }
        .octa-btn[data-color="3"]  { background: #00BFA5; }
        .octa-btn[data-color="4"]  { background: #FFD600; }
        .octa-btn[data-color="5"]  { background: #304FFE; }
        .octa-btn[data-color="6"]  { background: #AA00FF; }
        .octa-btn[data-color="7"]  { background: #FF6D00; }
        .octa-btn[data-color="8"]  { background: #00C853; }
        .octa-btn[data-color="9"]  { background: #D50000; }
        .octa-btn[data-color="10"] { background: #00B0FF; }
        .octa-btn[data-color="11"] { background: #37474F; }
        .octa-btn[data-color="12"] { background: #E040FB; }
        .octa-btn[data-color="13"] { background: #1565C0; }

        /* ─── PANELS ─── */
        .pages-container { width: 100%; margin-bottom: 4rem; }
        .page {
            background: var(--panel-bg); border-radius: 24px;
            border: 3px solid var(--panel-border);
            box-shadow: 0 8px 0 var(--shadow), 0 20px 50px rgba(0,0,0,0.1);
            overflow: hidden;
            max-height: 0; opacity: 0; visibility: hidden;
            transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.3s ease, visibility 0.3s;
            margin-bottom: 2rem;
        }
        .page.active-page { max-height: 4000px; opacity: 1; visibility: visible; }
        .page-inner { padding: 1.8rem; }
        .panel-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.4rem; }
        .panel-emoji { font-size: 2.4rem; }
        .panel-title { font-family: 'Pacifico', cursive; font-size: clamp(1.4rem,4vw,2rem); color: var(--text); }

        .spreadsheet-panel { display: grid; grid-template-columns: 220px 1fr; grid-template-rows: auto 1fr auto; gap: 14px; }
        @media (max-width: 780px) {
            .spreadsheet-panel { grid-template-columns: 1fr; }
            .grid-excel-cell { grid-column: 1 !important; grid-row: auto !important; }
        }
        .excel-cell { background: var(--panel-inner); border: 2px solid var(--border); border-radius: 16px; padding: 14px 16px; }

        .sentence-cell {
            grid-column: 1; grid-row: 1;
            display: flex; flex-wrap: wrap; align-items: center; gap: 7px;
            font-size: clamp(1.2rem,2.5vw,1.7rem); font-weight: 700;
        }
        .colored-word {
            color: #fff; padding: 0.2rem 1rem; border-radius: 100px; font-weight: 900;
            font-size: clamp(1.1rem,2vw,1.6rem); white-space: nowrap;
            box-shadow: 0 3px 0 rgba(0,0,0,0.18); border: 2px solid rgba(255,255,255,0.28);
        }

        .grid-excel-cell { grid-column: 2; grid-row: 1 / 3; overflow-x: auto; padding: 14px; }
        .month-grid-excel {
            display: grid;
            grid-template-columns: 40px repeat(12, minmax(40px, 1fr));
            gap: 3px; min-width: 580px;
        }
        .grid-header-excel {
            background: var(--grid-header); color: var(--grid-header-text);
            font-weight: 900; text-align: center; padding: 7px 3px; border-radius: 9px;
            font-size: 0.88rem; letter-spacing: 0.4px;
        }
        .row-label-excel {
            background: var(--grid-row-bg); color: var(--grid-row-text);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 9px; font-size: 0.8rem;
        }

        /* ─── GRID CELL ─── */
        .grid-cell-excel {
            background: var(--grid-cell);
            border-radius: 8px; border: 2px solid var(--grid-cell-border);
            aspect-ratio: 1/1;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; position: relative;
            transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
            z-index: 1;
        }
        .grid-cell-excel:hover { transform: scale(1.1); border-color: var(--accent); z-index: 2; }
        .grid-cell-excel.today-cell {
            background: var(--accent) !important; border-color: transparent;
            box-shadow: 0 2px 0 var(--shadow), 0 0 0 2.5px #fff;
            font-size: 0.55rem; font-weight: 900; color: #fff;
        }
        .grid-cell-excel.colored-cell { color: transparent; }
        .grid-cell-excel.menu-open {
            transform: scale(1.15); z-index: 200;
            box-shadow: 0 0 0 3px var(--accent), 0 6px 20px rgba(255,51,102,0.35);
        }

        /* ─── COLOUR POPUP ─── */
        .color-popup {
            position: absolute;
            background: var(--menu-bg);
            border: 3px solid var(--menu-border);
            border-radius: 100px;
            box-shadow: 0 8px 0 var(--shadow), 0 16px 40px var(--menu-shadow);
            padding: 9px 14px;
            display: flex; gap: 8px; align-items: center;
            z-index: 500; white-space: nowrap;
            /* default: above the cell */
            bottom: calc(100% + 14px);
            left: 50%;
            transform: translateX(-50%) scale(0.65);
            transform-origin: bottom center;
            opacity: 0; pointer-events: none;
            transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), opacity 0.16s ease;
        }
        .color-popup.open { transform: translateX(-50%) scale(1); opacity: 1; pointer-events: all; }
        /* tail arrow pointing down (toward cell) */
        .color-popup::after {
            content: ''; position: absolute;
            bottom: -10px; left: 50%; transform: translateX(-50%);
            border-left: 8px solid transparent; border-right: 8px solid transparent;
            border-top: 10px solid var(--menu-border);
        }
        /* flip to below cell */
        .color-popup.flip { bottom: auto; top: calc(100% + 14px); transform-origin: top center; transform: translateX(-50%) scale(0.65); }
        .color-popup.flip.open { transform: translateX(-50%) scale(1); }
        .color-popup.flip::after { bottom: auto; top: -10px; border-top: none; border-bottom: 10px solid var(--menu-border); }

        .erase-dot {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2.5px solid var(--border2); background: var(--surface2);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            font-size: 0.8rem; box-shadow: 0 2px 0 rgba(0,0,0,0.1); flex-shrink: 0;
            transition: transform 0.1s; color: var(--text3); font-weight: 900;
        }
        .erase-dot:hover { transform: scale(1.2); }
        .color-dot {
            width: 30px; height: 30px; border-radius: 50%;
            border: 2.5px solid rgba(255,255,255,0.5); box-shadow: 0 2px 0 rgba(0,0,0,0.15);
            cursor: pointer; flex-shrink: 0; transition: transform 0.1s, box-shadow 0.1s;
        }
        .color-dot:hover { transform: scale(1.22); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }

        /* ─── SWATCHES ─── */
        .swatch-excel-cell { grid-column: 1; grid-row: 2; }
        .swatch-excel-grid { display: flex; flex-direction: column; gap: 7px; }
        .swatch-excel-item { display: flex; align-items: center; gap: 11px; background: var(--swatch-bg); padding: 7px 13px; border-radius: 100px; border: 2px solid var(--swatch-border); }
        .swatch-excel-color { width: 32px; height: 32px; border-radius: 9px; border: 2px solid rgba(255,255,255,0.45); box-shadow: 0 2px 0 rgba(0,0,0,0.12); flex-shrink: 0; }
        .swatch-excel-name { font-size: 1rem; font-weight: 800; color: var(--swatch-text); }

        /* ─── BACK BUTTON ─── */
        .back-button-excel {
            grid-column: 1 / -1; background: var(--accent); color: #fff;
            border: 3px solid rgba(255,255,255,0.28); border-radius: 100px;
            font-size: 1.2rem; font-weight: 900; padding: 0.9rem; cursor: pointer;
            box-shadow: 0 5px 0 var(--shadow);
            display: flex; align-items: center; justify-content: center; gap: 10px;
            margin-top: 8px; font-family: 'Nunito', sans-serif;
            transition: transform 0.1s, box-shadow 0.1s, filter 0.1s;
            touch-action: manipulation; -webkit-tap-highlight-color: transparent;
        }
        .back-button-excel:active { transform: translateY(5px); box-shadow: 0 1px 0 var(--shadow); }
        .back-button-excel:hover { filter: brightness(1.08); }

        /* ─── BODY THEME TINTS ─── */
        body.theme-0  { background: #FFF0F3; } body.theme-1  { background: #FFF5E6; }
        body.theme-2  { background: #FFFDE7; } body.theme-3  { background: #E0FAFA; }
        body.theme-4  { background: #FFFDE7; } body.theme-5  { background: #E8EAF6; }
        body.theme-6  { background: #F3E5F5; } body.theme-7  { background: #FFF3E0; }
        body.theme-8  { background: #E8F5E9; } body.theme-9  { background: #FFEBEE; }
        body.theme-10 { background: #E1F5FE; } body.theme-11 { background: #ECEFF1; }
        body.theme-12 { background: #FCE4EC; } body.theme-13 { background: #E3F2FD; }
        [data-theme="dark"] body[class*="theme-"] { background: var(--bg) !important; }
    </style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
    <div class="ls" style="top:9%;left:6%;animation-delay:0s">🌸</div>
    <div class="ls" style="top:12%;right:9%;animation-delay:0.6s">✨</div>
    <div class="ls" style="bottom:18%;left:10%;animation-delay:1.1s">💖</div>
    <div class="ls" style="bottom:8%;right:7%;animation-delay:0.3s">🍰</div>
    <div class="ls" style="top:48%;left:2%;animation-delay:0.9s">⭐</div>
    <div class="ls" style="top:38%;right:3%;animation-delay:1.4s">🌟</div>
    <div class="cursive-kelly">Kelly</div>
    <div class="loading-sub">✨ loading kawaii things... ✨</div>
</div>

<button class="dark-toggle" id="darkToggle">🌙 dark</button>

<div class="site-wrapper" id="siteWrapper">

    <div class="journal-header">
        <div class="journal-title">my journal ✨</div>
    </div>

    <section class="calendar-section">
        <div class="kawaii-calendar">
            <div class="rainbow-stripe"></div>
            <div class="calendar-header">
                <span class="arrow" id="prevMonthBtn">◀</span>
                <span class="month-year" id="monthYearDisplay">June 2025</span>
                <span class="arrow" id="nextMonthBtn">▶</span>
            </div>
            <div class="clock-wrap">
                <div class="live-time" id="liveClock">⏰ 00:00:00</div>
            </div>
            <div class="weekdays">
                <span>🌻</span><span>🌞</span><span>🌼</span><span>🌸</span><span>🍄</span><span>🐻</span><span>🍰</span>
            </div>
            <div class="days-grid" id="daysGrid"></div>
            <div class="cal-note">🐰 colours stay forever ⋆⭒˚.⋆ 🐱</div>
        </div>
    </section>

    <div class="octagon-strip">
        <div class="strip-label">📓 pick a tracker</div>
        <button class="octa-btn" data-index="0"  data-color="0">🌈</button>
        <button class="octa-btn" data-index="1"  data-color="1">⭐</button>
        <button class="octa-btn" data-index="2"  data-color="2">❤️</button>
        <button class="octa-btn" data-index="3"  data-color="3">🧘</button>
        <button class="octa-btn" data-index="4"  data-color="4">⚡</button>
        <button class="octa-btn" data-index="5"  data-color="5">😴</button>
        <button class="octa-btn" data-index="6"  data-color="6">😪</button>
        <button class="octa-btn" data-index="7"  data-color="7">😰</button>
        <button class="octa-btn" data-index="8"  data-color="8">😥</button>
        <button class="octa-btn" data-index="9"  data-color="9">🤕</button>
        <button class="octa-btn" data-index="10" data-color="10">🩹</button>
        <button class="octa-btn" data-index="11" data-color="11">💼</button>
        <button class="octa-btn" data-index="12" data-color="12">🛍️</button>
        <button class="octa-btn" data-index="13" data-color="13">☀️</button>
    </div>

    <div class="pages-container" id="pagesContainer"></div>
</div>

<script>
(function () {
    const loading    = document.getElementById('loadingOverlay');
    const wrapper    = document.getElementById('siteWrapper');
    const htmlEl     = document.documentElement;
    const darkToggle = document.getElementById('darkToggle');

    /* dark mode */
    const savedTheme = localStorage.getItem('kawaiiTheme') || 'light';
    htmlEl.setAttribute('data-theme', savedTheme);
    darkToggle.textContent = savedTheme === 'dark' ? '☀️ light' : '🌙 dark';
    darkToggle.addEventListener('click', () => {
        const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        htmlEl.setAttribute('data-theme', next);
        localStorage.setItem('kawaiiTheme', next);
        darkToggle.textContent = next === 'dark' ? '☀️ light' : '🌙 dark';
    });
    window.addEventListener('load', () => {
        setTimeout(() => { loading.classList.add('loading-hidden'); wrapper.classList.add('visible'); }, 900);
    });

    /* tracker data */
    const pageData = [
        { emoji:'🌈', desc:'A year in colour',  lastWord:'colour',  accent:'#FF3366', swatches:[
            {color:'#FF3366',name:'🌟 Great day'},{color:'#FF8C42',name:'😊 Good day'},
            {color:'#FFCA28',name:'😐 Okay day'},{color:'#4CAF50',name:'😞 Bad day'},
            {color:'#2196F3',name:'😢 Sad day'},{color:'#9C27B0',name:'😤 Angry day'}]},
        { emoji:'⭐', desc:'Rate my day',        lastWord:'day',     accent:'#FF8C00', swatches:[
            {color:'#E53935',name:'⭐ 1 – terrible'},{color:'#FB8C00',name:'⭐⭐ 2 – bad'},
            {color:'#FDD835',name:'⭐⭐⭐ 3 – okay'},{color:'#43A047',name:'⭐⭐⭐⭐ 4 – good'},
            {color:'#1E88E5',name:'⭐⭐⭐⭐⭐ 5 – great'}]},
        { emoji:'❤️', desc:'A year of health',  lastWord:'health',  accent:'#FF1744', swatches:[
            {color:'#43A047',name:'💚 Well'},{color:'#FDD835',name:'🟡 Tired'},
            {color:'#FB8C00',name:'🟠 Sick'},{color:'#E53935',name:'🔴 In Pain'},
            {color:'#8BC34A',name:'⚡ Energetic'}]},
        { emoji:'🧘', desc:'Wellness tracker',  lastWord:'tracker', accent:'#00BFA5', swatches:[
            {color:'#B0BEC5',name:'✅ None'},{color:'#FDD835',name:'🤢 Nauseous'},
            {color:'#FF7043',name:'🔴 Sore throat'},{color:'#E53935',name:'🌡️ Fever'},
            {color:'#42A5F5',name:'🤧 Congested'},{color:'#78909C',name:'💨 Cough'},
            {color:'#AB47BC',name:'😵 Dizzy'}]},
        { emoji:'⚡', desc:'Energy tracker',    lastWord:'tracker', accent:'#FFD600', swatches:[
            {color:'#78909C',name:'🔋 Low'},{color:'#FB8C00',name:'🔋🔋 Medium'},
            {color:'#FFD600',name:'🔋🔋🔋 High'}]},
        { emoji:'😴', desc:'Sleep tracker',     lastWord:'tracker', accent:'#304FFE', swatches:[
            {color:'#FFEB3B',name:'😩 < 4 hrs'},{color:'#FF9800',name:'😪 4–5 hrs'},
            {color:'#4CAF50',name:'🙂 5–6 hrs'},{color:'#2196F3',name:'😊 6–7 hrs'},
            {color:'#3F51B5',name:'😌 7–8 hrs'},{color:'#1A237E',name:'😴 8–9 hrs'},
            {color:'#0D0A2E',name:'💤 9+ hrs'}]},
        { emoji:'😪', desc:'A year of naps',    lastWord:'naps',    accent:'#AA00FF', swatches:[
            {color:'#ECEFF1',name:'❌ No nap'},{color:'#CE93D8',name:'💜 < 30 min'},
            {color:'#AB47BC',name:'💜💜 30 min–1 hr'},{color:'#8E24AA',name:'💜💜💜 1–2 hrs'},
            {color:'#6A1B9A',name:'💜💜💜💜 2–3 hrs'},{color:'#4A148C',name:'💜💜💜💜💜 3+ hrs'}]},
        { emoji:'😰', desc:'Anxiety tracker',   lastWord:'tracker', accent:'#FF6D00', swatches:[
            {color:'#A5D6A7',name:'🟢 Low'},{color:'#FFF176',name:'🟡 Mild'},
            {color:'#FFAB40',name:'🟠 Moderate'},{color:'#EF5350',name:'🔴 High'},
            {color:'#880E4F',name:'🟣 Severe'}]},
        { emoji:'😥', desc:'Stress tracker',    lastWord:'tracker', accent:'#00C853', swatches:[
            {color:'#A5D6A7',name:'🟢 Low'},{color:'#C5E1A5',name:'🟡 Mild'},
            {color:'#FFCC02',name:'🟠 Moderate'},{color:'#FF5722',name:'🔴 High'},
            {color:'#B71C1C',name:'🆘 Severe'}]},
        { emoji:'🤕', desc:'Headache tracker',  lastWord:'tracker', accent:'#D50000', swatches:[
            {color:'#E0E0E0',name:'✅ None'},{color:'#FFF9C4',name:'💛 Mild'},
            {color:'#FFB74D',name:'🟠 Moderate'},{color:'#F4511E',name:'🔴 High'},
            {color:'#B71C1C',name:'🆘 Severe'}]},
        { emoji:'🩹', desc:'Pain tracker',      lastWord:'tracker', accent:'#00B0FF', swatches:[
            {color:'#E0E0E0',name:'✅ No pain'},{color:'#4FC3F7',name:'💙 Back pain'},
            {color:'#4DB6AC',name:'💚 Leg pain'},{color:'#FFB74D',name:'🟠 Stomach pain'},
            {color:'#F06292',name:'💗 Cramps'},{color:'#CE93D8',name:'💜 Body pain'}]},
        { emoji:'💼', desc:'How much work?',    lastWord:'work?',   accent:'#37474F', swatches:[
            {color:'#CFD8DC',name:'0️⃣ None'},{color:'#90A4AE',name:'1️⃣ < 2 hrs'},
            {color:'#607D8B',name:'2️⃣ 2–4 hrs'},{color:'#455A64',name:'3️⃣ 4–6 hrs'},
            {color:'#263238',name:'4️⃣ 6–8 hrs'},{color:'#000000',name:'5️⃣ 8+ hrs'}]},
        { emoji:'🛍️', desc:'Shopping tracker', lastWord:'tracker', accent:'#E040FB', swatches:[
            {color:'#F8BBD9',name:'🏬 Mall'},{color:'#80DEEA',name:'🛒 Supermarket'},
            {color:'#FF8A65',name:'📦 Amazon'},{color:'#AED581',name:'📚 School supplies'},
            {color:'#FFD54F',name:'🍟 Fast food'},{color:'#CE93D8',name:'🌀 Other'},
            {color:'#EEEEEE',name:'❌ None'}]},
        { emoji:'☀️', desc:'Weather tracker',  lastWord:'tracker', accent:'#1565C0', swatches:[
            {color:'#FFD600',name:'☀️ Sunny'},{color:'#FFA726',name:'⛅ Partly cloudy'},
            {color:'#B0BEC5',name:'☁️ Cloudy'},{color:'#42A5F5',name:'🌧️ Rainy'},
            {color:'#1565C0',name:'⛈️ Stormy'},{color:'#B3E5FC',name:'❄️ Snowy'},
            {color:'#90A4AE',name:'🌫️ Foggy'},{color:'#80CBC4',name:'💨 Windy'}]},
    ];

    const MI = ['J','F','M','A','M','J','J','A','S','O','N','D'];
    const container  = document.getElementById('pagesContainer');
    const todayDate  = new Date();
    const currentDay = todayDate.getDate();
    const currentMon = todayDate.getMonth();

    /* persistence */
    function loadColors() { try { return JSON.parse(localStorage.getItem('kawaiiColorsV3') || '{}'); } catch(e){ return {}; } }
    function saveColors(o) { localStorage.setItem('kawaiiColorsV3', JSON.stringify(o)); }
    let colorStore = loadColors();

    /* popup state */
    let openCell = null;

    function closePopup() {
        if (!openCell) return;
        const p = openCell.querySelector('.color-popup');
        if (p) p.classList.remove('open');
        openCell.classList.remove('menu-open');
        openCell = null;
    }

    function togglePopup(cell) {
        if (openCell === cell) { closePopup(); return; }
        if (openCell) closePopup();
        const popup = cell.querySelector('.color-popup');
        if (!popup) return;
        // flip below if near top of viewport
        const rect = cell.getBoundingClientRect();
        if (rect.top < 100) {
            popup.classList.add('flip');
        } else {
            popup.classList.remove('flip');
        }
        openCell = cell;
        cell.classList.add('menu-open');
        requestAnimationFrame(() => requestAnimationFrame(() => popup.classList.add('open')));
    }

    /* close on outside click */
    document.addEventListener('click', e => {
        if (openCell && !openCell.contains(e.target)) closePopup();
    }, true);

    /* build popup */
    function buildPopup(swatches, cell, pageIdx) {
        const popup = document.createElement('div');
        popup.className = 'color-popup';
        const day = cell.dataset.day, mon = cell.dataset.month;

        // erase
        const erase = document.createElement('div');
        erase.className = 'erase-dot'; erase.title = 'Clear'; erase.textContent = '✕';
        erase.addEventListener('click', e => {
            e.stopPropagation();
            cell.style.backgroundColor = '';
            cell.classList.remove('colored-cell');
            delete colorStore[`${pageIdx}-${day}-${mon}`];
            saveColors(colorStore);
            closePopup();
        });
        popup.appendChild(erase);

        swatches.forEach(s => {
            const dot = document.createElement('div');
            dot.className = 'color-dot';
            dot.style.backgroundColor = s.color;
            dot.title = s.name;
            dot.addEventListener('click', e => {
                e.stopPropagation();
                cell.style.backgroundColor = s.color;
                cell.classList.add('colored-cell');
                colorStore[`${pageIdx}-${day}-${mon}`] = s.color;
                saveColors(colorStore);
                closePopup();
            });
            popup.appendChild(dot);
        });

        popup.addEventListener('click', e => e.stopPropagation());
        return popup;
    }

    /* attach cells (called once per panel, after it opens) */
    function attachCells(panel, swatches, pageIdx) {
        panel.querySelectorAll('.grid-cell-excel').forEach(cell => {
            if (cell._attached) return;
            cell._attached = true;

            const popup = buildPopup(swatches, cell, pageIdx);
            cell.style.position = 'relative';
            cell.appendChild(popup);

            // restore colour
            const key = `${pageIdx}-${cell.dataset.day}-${cell.dataset.month}`;
            if (colorStore[key] && !cell.classList.contains('today-cell')) {
                cell.style.backgroundColor = colorStore[key];
                cell.classList.add('colored-cell');
            }

            cell.addEventListener('click', e => { e.stopPropagation(); togglePopup(cell); });
        });
    }

    /* build all panels */
    pageData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = 'page'; div.setAttribute('data-page', idx);

        const rest = item.desc.split(' ').slice(0,-1).join(' ');
        const swatchHtml = item.swatches.map(s =>
            `<div class="swatch-excel-item">
                <div class="swatch-excel-color" style="background:${s.color}"></div>
                <span class="swatch-excel-name">${s.name}</span>
            </div>`).join('');

        const hdr = `<div class="grid-header-excel"></div>` + MI.map(m=>`<div class="grid-header-excel">${m}</div>`).join('');
        let rows = '';
        for (let d = 1; d <= 31; d++) {
            rows += `<div class="row-label-excel">${d}</div>`;
            for (let m = 0; m < 12; m++) {
                const t = (d===currentDay && m===currentMon) ? ' today-cell' : '';
                rows += `<div class="grid-cell-excel${t}" data-day="${d}" data-month="${m}"></div>`;
            }
        }

        div.innerHTML = `
        <div class="page-inner">
            <div class="panel-header">
                <span class="panel-emoji">${item.emoji}</span>
                <span class="panel-title">${item.desc}</span>
            </div>
            <div class="spreadsheet-panel">
                <div class="excel-cell sentence-cell">
                    ${rest} <span class="colored-word" style="background:${item.accent}">${item.lastWord}</span>
                </div>
                <div class="excel-cell grid-excel-cell">
                    <div class="month-grid-excel">${hdr}${rows}</div>
                </div>
                <div class="excel-cell swatch-excel-cell">
                    <div class="swatch-excel-grid">${swatchHtml}</div>
                </div>
                <button class="back-button-excel">🔙 back to journal</button>
            </div>
        </div>`;
        container.appendChild(div);
    });

    /* tracker buttons */
    const pages = document.querySelectorAll('.page');
    function closeAll() { pages.forEach(p => p.classList.remove('active-page')); closePopup(); }

    document.querySelectorAll('.octa-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            const idx = +btn.dataset.index, color = btn.dataset.color;
            loading.classList.remove('loading-hidden'); wrapper.classList.remove('visible');
            setTimeout(() => {
                document.body.className = `theme-${color}`;
                closeAll();
                const target = document.querySelector(`.page[data-page="${idx}"]`);
                if (target) {
                    target.classList.add('active-page');
                    setTimeout(() => {
                        const panel = target.querySelector('.spreadsheet-panel');
                        if (panel) attachCells(panel, pageData[idx].swatches, idx);
                        container.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }, 200);
                }
                setTimeout(() => { loading.classList.add('loading-hidden'); wrapper.classList.add('visible'); }, 340);
            }, 270);
        });
    });

    container.addEventListener('click', e => {
        if (!e.target.closest('.back-button-excel')) return;
        loading.classList.remove('loading-hidden'); wrapper.classList.remove('visible');
        setTimeout(() => {
            closeAll(); document.body.className = 'theme-0';
            document.querySelector('.calendar-section').scrollIntoView({ behavior: 'smooth', block: 'center' });
            loading.classList.add('loading-hidden'); wrapper.classList.add('visible');
        }, 270);
    });

    /* calendar */
    const monthYearEl = document.getElementById('monthYearDisplay');
    const daysGridEl  = document.getElementById('daysGrid');
    const clockEl     = document.getElementById('liveClock');
    let dispY = todayDate.getFullYear(), dispM = todayDate.getMonth();
    const MNAMES = ["January","February","March","April","May","June","July","August","September","October","November","December"];

    function renderCal() {
        const t = new Date();
        const fd = new Date(dispY, dispM, 1).getDay();
        const dm = new Date(dispY, dispM + 1, 0).getDate();
        const dp = new Date(dispY, dispM, 0).getDate();
        monthYearEl.textContent = `${MNAMES[dispM]} ${dispY}`;
        let html = '';
        for (let i = 0; i < fd; i++) html += `<span class="day-cell other-month">${dp - fd + i + 1}</span>`;
        for (let d = 1; d <= dm; d++) {
            const isT = d===t.getDate() && dispM===t.getMonth() && dispY===t.getFullYear();
            html += `<span class="day-cell${isT?' today':''}">${d}</span>`;
        }
        const total = Math.ceil((fd + dm) / 7) * 7;
        for (let n = 1; n <= total-(fd+dm); n++) html += `<span class="day-cell other-month">${n}</span>`;
        daysGridEl.innerHTML = html;
    }
    function tick() {
        const n = new Date(), pad = v => String(v).padStart(2,'0');
        clockEl.textContent = `⏰ ${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    }

    document.getElementById('prevMonthBtn').addEventListener('click', () => { if(dispM===0){dispM=11;dispY--;}else dispM--; renderCal(); });
    document.getElementById('nextMonthBtn').addEventListener('click', () => { if(dispM===11){dispM=0;dispY++;}else dispM++; renderCal(); });
    document.querySelector('.month-year').addEventListener('click', () => { const n=new Date(); dispY=n.getFullYear(); dispM=n.getMonth(); renderCal(); });

    renderCal(); tick(); setInterval(tick, 1000);
})();
</script>
</body>
</html>
